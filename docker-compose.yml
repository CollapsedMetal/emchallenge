services:
  emchallenge_buk:
    build: .
    command: ["$PWD"]
    image: emchallenge_buk:latest
    container_name: emchallenge_buk
    ports:
      - "3000:3000"
    volumes:
      - ./:/app
      - /app/node_modules
    depends_on:
      - redis
    environment:
      - REDIS_URL=redis://redis:6379

  redis:
    image: redis:7-alpine
    container_name: emchallenge_redis
    ports:
      - "6379:6379"
    volumes:
      - ./redis_data:/data